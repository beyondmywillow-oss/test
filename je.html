<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Trip Planner ✈️</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Chonburi&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #FDFCF8; }
        .font-cooper { font-family: 'Cooper Black', 'Chonburi', serif; }
        /* 스크롤바 숨기기 */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- Icon Components ---
        const IconBase = ({ children, size = 18, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );
        const MapPin = (props) => <IconBase {...props}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></IconBase>;
        const Utensils = (props) => <IconBase {...props}><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></IconBase>;
        const ShoppingBag = (props) => <IconBase {...props}><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></IconBase>;
        const Car = (props) => <IconBase {...props}><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><path d="M9 17h6"/><circle cx="17" cy="17" r="2"/></IconBase>;
        const Plus = (props) => <IconBase {...props}><path d="M5 12h14"/><path d="M12 5v14"/></IconBase>;
        const X = (props) => <IconBase {...props}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></IconBase>;
        const ExternalLink = (props) => <IconBase {...props}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" x2="21" y1="14" y2="3"/></IconBase>;
        const Edit2 = (props) => <IconBase {...props}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></IconBase>;
        const Tag = (props) => <IconBase {...props}><path d="M12 2H2v10l9.29 9.29c.94.94 2.48.94 3.42 0l6.58-6.58c.94-.94.94-2.48 0-3.42L12 2Z"/><path d="M7 7h.01"/></IconBase>;
        const ChevronDown = (props) => <IconBase {...props}><path d="m6 9 6 6 6-6"/></IconBase>;
        const ChevronUp = (props) => <IconBase {...props}><path d="m18 15-6-6-6 6"/></IconBase>;
        const Calculator = (props) => <IconBase {...props}><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></IconBase>;
        const ArrowRightLeft = (props) => <IconBase {...props}><path d="m16 3 4 4-4 4"/><path d="M20 7H4"/><path d="m8 21-4-4 4-4"/><path d="M4 17h16"/></IconBase>;
        const Trash2 = (props) => <IconBase {...props}><path d="M3 6h18"/><path d="M19 6v14c0 1.1-.9 2-2 2H7c-1.1 0-2-.9-2-2V6"/><path d="M8 6V4c0-1.1.9-2 2-2h4c1.1 0 2 .9 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></IconBase>;
        const Home = (props) => <IconBase {...props}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></IconBase>;
        const Wallet = (props) => <IconBase {...props}><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></IconBase>;
        const RefreshCw = (props) => <IconBase {...props}><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></IconBase>;
        const Pencil = (props) => <IconBase {...props}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></IconBase>;

        // --- Main Component ---
        const TripPlanner = () => {
            // State
            const [activeTab, setActiveTab] = useState('itinerary'); 
            const [selectedDayId, setSelectedDayId] = useState(1);
            
            // App Config State (Destination)
            const [destination, setDestination] = useState(() => {
                return localStorage.getItem('dynamicTripDest') || 'Paris Trip ✈️';
            });
            const [isEditingDest, setIsEditingDest] = useState(false);
            
            // Modals
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isConverterOpen, setIsConverterOpen] = useState(false);
            const [deleteTarget, setDeleteTarget] = useState(null);
            const [isBudgetModalOpen, setIsBudgetModalOpen] = useState(false);

            const [editingEventId, setEditingEventId] = useState(null);
            const [expandedCategory, setExpandedCategory] = useState(null); 
            
            // Data State (EUR)
            const [exchangeRate, setExchangeRate] = useState(1450); // EUR 기본값
            const [isRateLive, setIsRateLive] = useState(false); 
            const [convertValues, setConvertValues] = useState({ eur: '', krw: '' });
            
            // Budget State
            const [totalBudget, setTotalBudget] = useState(() => {
                const saved = localStorage.getItem('dynamicTripBudget');
                return saved ? Number(saved) : 0;
            });

            // Initial Days Data (EUR 기준 샘플 데이터)
            const initialDays = [
                { id: 1, date: "4/15 (월)", title: "도착 & 시내 구경", 
                events: [
                    { id: 101, type: 'transport', time: '14:00', title: '샤를 드골 공항 도착', note: '수하물 찾기 & RER B선 탑승', cost: 12 },
                    { id: 102, type: 'etc', time: '16:00', title: '호텔 체크인', note: '마레 지구 인근 호텔', cost: 0 },
                    { id: 103, type: 'food', time: '18:00', title: 'Le Marais 로컬 식당', note: '어니언 수프 & 오리 가슴살', cost: 45, menu: '코스 요리' },
                    { id: 104, type: 'visit', time: '20:30', title: '센 강 산책', note: '에펠탑 야경 감상', cost: 0 }
                ]
                },
                { id: 2, date: "4/16 (화)", title: "루브르 & 쇼핑", 
                events: [
                    { id: 201, type: 'food', time: '09:00', title: '크루아상 & 커피', note: '호텔 근처 베이커리', cost: 8 },
                    { id: 202, type: 'visit', time: '10:00', title: '루브르 박물관', note: '사전 예약 필수 (모나리자 관람)', cost: 22 },
                    { id: 203, type: 'food', time: '13:30', title: '앙젤리나 (Angelina)', note: '몽블랑 & 핫초코', cost: 20 },
                    { id: 204, type: 'shop', time: '15:00', title: '라파예트 백화점', note: '향수 및 기념품', cost: 150, items: ['니치 향수', '마카롱 세트'] }
                ]
                }
            ];

            const [days, setDays] = useState(() => {
                const saved = localStorage.getItem('dynamicTripData');
                return saved ? JSON.parse(saved) : initialDays;
            });

            // Effects
            useEffect(() => {
                localStorage.setItem('dynamicTripData', JSON.stringify(days));
            }, [days]);

            useEffect(() => {
                localStorage.setItem('dynamicTripBudget', totalBudget);
            }, [totalBudget]);

            useEffect(() => {
                localStorage.setItem('dynamicTripDest', destination);
            }, [destination]);

            // 실시간 환율 가져오기 (EUR 기준)
            useEffect(() => {
                const fetchRate = async () => {
                    try {
                        const response = await fetch('https://api.exchangerate-api.com/v4/latest/EUR');
                        const data = await response.json();
                        if (data && data.rates && data.rates.KRW) {
                            setExchangeRate(Math.round(data.rates.KRW * 100) / 100);
                            setIsRateLive(true);
                        }
                    } catch (error) {
                        console.error("Exchange rate fetch failed, using default.");
                        setIsRateLive(false);
                    }
                };
                fetchRate();
            }, []);

            const [newEntry, setNewEntry] = useState({
                type: 'food', title: '', time: '', cost: '', currency: 'EUR', note: '', link: '', items: '',
            });

            // Converter Handlers
            const handleEurChange = (e) => {
                const val = e.target.value;
                setConvertValues({ eur: val, krw: val ? Math.round(Number(val) * exchangeRate) : '' });
            };
            const handleKrwChange = (e) => {
                const val = e.target.value;
                setConvertValues({ eur: val ? (Number(val) / exchangeRate).toFixed(2) : '', krw: val });
            };

            // Modal Handlers
            const openAddModal = () => {
                setNewEntry({ type: 'food', title: '', time: '', cost: '', currency: 'EUR', note: '', link: '', items: '' });
                setEditingEventId(null);
                setIsModalOpen(true);
            };

            const openEditModal = (event) => {
                let mappedType = event.type;
                if (!['food', 'visit', 'shop', 'transport', 'etc'].includes(mappedType)) {
                    mappedType = 'visit';
                }
                setNewEntry({
                    type: mappedType,
                    title: event.title,
                    time: event.time || '',
                    cost: event.cost || '',
                    currency: 'EUR',
                    note: event.note || '',
                    link: event.link || '',
                    items: event.type === 'shop' && event.items ? event.items.join(', ') : (event.menu || ''),
                });
                setEditingEventId(event.id);
                setIsModalOpen(true);
            };

            const handleSaveEntry = () => {
                if (!newEntry.title) return;
                const processedItems = (newEntry.type === 'shop' || newEntry.type === 'food') && newEntry.items ? newEntry.items.split(',').map(i => i.trim()) : [];
                const eventData = {
                    type: newEntry.type,
                    title: newEntry.title,
                    time: newEntry.time,
                    cost: newEntry.cost ? Number(newEntry.cost) : 0,
                    note: newEntry.note,
                    link: newEntry.link,
                    items: newEntry.type === 'shop' ? processedItems : [],
                    menu: newEntry.type === 'food' ? newEntry.items : undefined
                };

                if (editingEventId) {
                    setDays(prev => prev.map(d => d.id === selectedDayId ? { ...d, events: d.events.map(ev => ev.id === editingEventId ? { ...ev, ...eventData } : ev).sort((a, b) => (a.time || '').localeCompare(b.time || '')) } : d));
                } else {
                    setDays(prev => prev.map(d => d.id === selectedDayId ? { ...d, events: [...d.events, { id: Date.now(), ...eventData }].sort((a, b) => (a.time || '').localeCompare(b.time || '')) } : d));
                }
                setIsModalOpen(false);
            };

            const initiateDelete = (dayId, eventId, e) => {
                e.stopPropagation();
                setDeleteTarget({ dayId, eventId });
            };
            const confirmDelete = () => {
                if (!deleteTarget) return;
                setDays(prev => prev.map(d => d.id === deleteTarget.dayId ? { ...d, events: d.events.filter(ev => ev.id !== deleteTarget.eventId) } : d));
                setDeleteTarget(null);
            };
            const cancelDelete = () => setDeleteTarget(null);
            const toggleCategory = (cat) => setExpandedCategory(expandedCategory === cat ? null : cat);
            
            const handleRefreshRate = () => {
                 setIsRateLive(false);
                 setTimeout(() => {
                     fetch('https://api.exchangerate-api.com/v4/latest/EUR')
                    .then(res => res.json())
                    .then(data => {
                        setExchangeRate(Math.round(data.rates.KRW * 100) / 100);
                        setIsRateLive(true);
                    })
                    .catch(() => setIsRateLive(false));
                 }, 500);
            };

            const handleDestChange = (e) => {
                if (e.key === 'Enter') setIsEditingDest(false);
            };

            // Styling
            const colors = {
                bg: "bg-[#FDFCF8]",
                card: "bg-white",
                blue: { bg: "bg-sky-100", text: "text-sky-600", border: "border-sky-200" }, 
                green: { bg: "bg-lime-100", text: "text-lime-700", border: "border-lime-200" }, 
                purple: { bg: "bg-purple-100", text: "text-purple-600", border: "border-purple-200" }, 
                orange: { bg: "bg-orange-50", text: "text-orange-600", border: "border-orange-100" }, 
                pink: { bg: "bg-rose-50", text: "text-rose-500", border: "border-rose-100" }, 
            };

            const getCategoryColor = (type) => {
                switch (type) {
                    case 'shop': return colors.purple;
                    case 'transport': return colors.blue;
                    case 'food': return colors.orange;
                    case 'etc': return colors.pink;
                    default: return colors.green;
                }
            };

            const getIcon = (type) => {
                const className = `w-5 h-5 ${getCategoryColor(type).text}`;
                switch (type) {
                    case 'food': return <Utensils className={className} />;
                    case 'shop': return <ShoppingBag className={className} />;
                    case 'transport': return <Car className={className} />;
                    case 'etc': return <Home className={className} />;
                    default: return <MapPin className={className} />;
                }
            };

            const currentDay = days.find(d => d.id === selectedDayId) || days[0];
            const stats = useMemo(() => days.reduce((acc, d) => acc + d.events.reduce((s, e) => s + (e.cost || 0), 0), 0), [days]);
            
            const remainingBudget = totalBudget - stats;
            const spendPercent = totalBudget > 0 ? Math.min(100, (stats / totalBudget) * 100) : 0;

            const expensesByCategory = useMemo(() => {
                const cats = {
                    shop: { label: '쇼핑 (Shopping)', total: 0, items: [], color: colors.purple },
                    food: { label: '식비 (Food)', total: 0, items: [], color: colors.orange },
                    transport: { label: '교통 (Transport)', total: 0, items: [], color: colors.blue },
                    others: { label: '숙소/기타 (Others)', total: 0, items: [], color: colors.pink }
                };
                days.forEach(day => day.events.forEach(event => {
                    if (event.cost > 0) {
                        let target = cats.others;
                        if (event.type === 'shop') target = cats.shop;
                        else if (event.type === 'food') target = cats.food;
                        else if (event.type === 'transport') target = cats.transport;
                        else if (['etc', 'checkin', 'visit'].includes(event.type)) target = cats.others;
                        if (event.type === 'visit') target = cats.others; 
                        target.total += event.cost;
                        target.items.push({ ...event, date: day.date });
                    }
                }));
                return cats;
            }, [days]);

            return (
                <div className={`max-w-md mx-auto h-screen ${colors.bg} flex flex-col font-sans text-slate-700`}>
                    {/* Header */}
                    <header className="px-4 pt-6 pb-2 bg-white/90 backdrop-blur-md sticky top-0 z-30 border-b border-stone-100 shadow-sm">
                        <div className="flex justify-between items-center mb-3">
                            {/* Destination Title (Click to edit) */}
                            <div className="flex items-center gap-1 flex-1">
                                {isEditingDest ? (
                                    <input 
                                        autoFocus
                                        type="text" 
                                        value={destination} 
                                        onChange={(e) => setDestination(e.target.value)} 
                                        onBlur={() => setIsEditingDest(false)}
                                        onKeyDown={handleDestChange}
                                        className="text-xl text-stone-800 tracking-tight font-cooper bg-transparent border-b border-stone-300 outline-none w-4/5"
                                    />
                                ) : (
                                    <h1 onClick={() => setIsEditingDest(true)} className="text-xl text-stone-800 tracking-tight font-cooper cursor-pointer hover:opacity-70 truncate flex items-center gap-2">
                                        {destination} <Pencil size={12} className="text-stone-300" />
                                    </h1>
                                )}
                            </div>
                            <div className="flex items-center gap-3 shrink-0">
                                <button onClick={() => setIsConverterOpen(true)} className="p-2 bg-stone-100 rounded-full text-stone-600 hover:bg-stone-200 transition-colors" title="환율 계산기"><Calculator size={18} /></button>
                                <div className="text-right">
                                    <span className="text-[10px] font-bold text-stone-400 block uppercase tracking-wider">Total Spent</span>
                                    <span className="text-lg font-bold text-stone-700 leading-none">{stats.toLocaleString()} €</span>
                                </div>
                            </div>
                        </div>
                        <div className="flex p-1 bg-stone-100 rounded-xl">
                            <button onClick={() => setActiveTab('itinerary')} className={`flex-1 py-2 text-xs font-bold rounded-lg transition-all ${activeTab === 'itinerary' ? 'bg-white text-stone-800 shadow-sm' : 'text-stone-400'}`}>여행 일정</button>
                            <button onClick={() => setActiveTab('shopping')} className={`flex-1 py-2 text-xs font-bold rounded-lg transition-all ${activeTab === 'shopping' ? 'bg-white text-purple-600 shadow-sm' : 'text-stone-400'}`}>카테고리 & 예산</button>
                        </div>
                    </header>

                    {/* Content */}
                    <div className="flex-1 overflow-hidden relative">
                        {activeTab === 'itinerary' && currentDay && (
                            <div className="h-full flex flex-col">
                                <div className="overflow-x-auto whitespace-nowrap px-4 py-3 shrink-0 scrollbar-hide bg-white/50">
                                    <div className="flex space-x-2">
                                        {days.map(day => (
                                            <button key={day.id} onClick={() => setSelectedDayId(day.id)} className={`flex flex-col items-center justify-center min-w-[56px] h-[56px] rounded-xl transition-all border ${selectedDayId === day.id ? 'bg-lime-100 border-lime-300 text-lime-800 shadow-sm scale-105' : 'bg-white border-stone-100 text-stone-400'}`}>
                                                <span className="text-[10px] font-bold uppercase">{day.date.split(' ')[1].replace(/[()]/g, '')}</span>
                                                <span className="text-sm font-bold">{day.date.split(' ')[0].split('/')[1]}</span>
                                            </button>
                                        ))}
                                        {/* 데이 추가 버튼 임시 숨김 (기능 필요시 추가 가능) */}
                                    </div>
                                </div>
                                <div className="flex-1 overflow-y-auto px-4 pb-24">
                                    <div className="bg-stone-800 text-white p-4 rounded-2xl mb-5 flex justify-between items-center shadow-lg shadow-stone-200 mt-2">
                                        <div><span className="text-lime-400 font-bold text-[10px] tracking-wider uppercase mb-1 block">Travel Log</span><h2 className="text-lg font-bold">{currentDay.date}</h2></div>
                                        <div className="flex items-center gap-3">
                                            <div className="text-right"><span className="block text-[10px] text-stone-400 font-medium tracking-wider">DAY</span><span className="block text-2xl font-black leading-none">{currentDay.id}</span></div>
                                            <div className="h-8 w-[1px] bg-stone-600"></div>
                                            <div className="bg-white/10 backdrop-blur-md px-3 py-1.5 rounded-lg border border-white/10"><span className="font-bold text-sm">D+{currentDay.id}</span></div>
                                        </div>
                                    </div>
                                    <div className="space-y-4">
                                        {currentDay.events.map((event, index) => {
                                            const style = getCategoryColor(event.type);
                                            return (
                                                <div key={event.id} className="relative pl-3">
                                                    {index !== currentDay.events.length - 1 && <div className="absolute left-[22px] top-10 bottom-[-24px] w-[2px] bg-stone-100"></div>}
                                                    <div className="flex gap-3">
                                                        <div className={`shrink-0 w-10 h-10 rounded-full ${style.bg} flex items-center justify-center border-2 border-white shadow-sm z-10`}>{getIcon(event.type)}</div>
                                                        <div className={`flex-1 bg-white p-4 rounded-2xl border ${style.border} shadow-sm relative group`}>
                                                            <div className="absolute top-3 right-3 flex gap-2 z-20">
                                                                <button onClick={(e) => { e.stopPropagation(); openEditModal(event); }} className="p-1.5 bg-stone-50 rounded-full text-stone-400 hover:text-sky-500 hover:bg-sky-50 transition-colors cursor-pointer"><Edit2 size={12}/></button>
                                                                <button onClick={(e) => initiateDelete(currentDay.id, event.id, e)} className="p-1.5 bg-stone-50 rounded-full text-stone-400 hover:text-red-500 hover:bg-red-50 transition-colors cursor-pointer"><Trash2 size={12}/></button>
                                                            </div>
                                                            <div className="flex items-center gap-2 mb-1 pr-14">
                                                                <span className={`text-[10px] font-bold px-2 py-0.5 rounded-md ${style.bg} ${style.text}`}>{event.time || 'Time'}</span>
                                                                {event.link && <a href={event.link} target="_blank" rel="noreferrer" className="text-stone-300 hover:text-sky-500"><ExternalLink size={12} /></a>}
                                                            </div>
                                                            <h3 className="font-bold text-stone-700 pr-2 text-sm">{event.title}</h3>
                                                            {event.note && <p className="text-xs text-stone-400 mt-1">{event.note}</p>}
                                                            {(event.cost > 0 || event.menu || (event.items && event.items.length > 0)) && (
                                                                <div className="mt-3 pt-3 border-t border-stone-50 flex flex-wrap gap-2">
                                                                    {event.cost > 0 && <div className="text-xs font-bold text-stone-600 bg-stone-100 px-2 py-1 rounded">-{event.cost.toLocaleString()} €</div>}
                                                                    {event.menu && <div className="text-xs text-orange-600 bg-orange-50 px-2 py-1 rounded border border-orange-100">{event.menu}</div>}
                                                                    {event.items && event.items.map((item, i) => <div key={i} className="text-xs text-purple-600 bg-purple-50 px-2 py-1 rounded border border-purple-100">{item}</div>)}
                                                                </div>
                                                            )}
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                    <button onClick={openAddModal} className="mt-6 w-full py-3.5 rounded-xl border-2 border-dashed border-stone-300 text-stone-400 font-bold text-sm hover:border-lime-400 hover:text-lime-600 hover:bg-lime-50 transition-all flex items-center justify-center gap-2"><Plus size={16} /> 일정 추가하기</button>
                                </div>
                            </div>
                        )}
                        {activeTab === 'shopping' && (
                            <div className="h-full overflow-y-auto px-4 py-4 pb-24">
                                {/* Budget Card */}
                                <div className="bg-white rounded-3xl shadow-sm border border-stone-100 p-5 mb-5 relative overflow-hidden">
                                    <div className="flex justify-between items-start mb-4 relative z-10">
                                        <div>
                                            <h3 className="text-stone-500 text-xs font-bold uppercase tracking-wider mb-1">Total Budget</h3>
                                            {totalBudget === 0 ? (
                                                <button onClick={() => setIsBudgetModalOpen(true)} className="text-blue-500 font-bold text-sm underline">환전한 금액 입력하기</button>
                                            ) : (
                                                <div className="flex items-baseline gap-2 cursor-pointer" onClick={() => setIsBudgetModalOpen(true)}>
                                                    <span className="text-2xl font-black text-stone-800">{totalBudget.toLocaleString()}</span>
                                                    <span className="text-xs font-bold text-stone-400">EUR <Edit2 size={10} className="inline ml-1"/></span>
                                                </div>
                                            )}
                                        </div>
                                        <div className="text-right">
                                            <h3 className="text-stone-500 text-xs font-bold uppercase tracking-wider mb-1">Remaining</h3>
                                            <span className={`text-xl font-black ${remainingBudget >= 0 ? 'text-emerald-500' : 'text-red-500'}`}>{remainingBudget.toLocaleString()}</span>
                                            <span className="text-xs font-bold text-stone-400 ml-1">EUR</span>
                                        </div>
                                    </div>
                                    
                                    {/* Progress Bar */}
                                    <div className="relative h-3 bg-stone-100 rounded-full overflow-hidden mb-2">
                                        <div className={`absolute top-0 left-0 h-full rounded-full transition-all duration-500 ${spendPercent > 100 ? 'bg-red-400' : 'bg-purple-400'}`} style={{width: `${spendPercent}%`}}></div>
                                    </div>
                                    <div className="flex justify-between text-[10px] font-bold text-stone-400">
                                        <span>지출 {stats.toLocaleString()} € ({Math.round(spendPercent)}%)</span>
                                        <span>잔액 {remainingBudget.toLocaleString()} €</span>
                                    </div>
                                </div>

                                <div className="space-y-3">
                                    {['shop', 'food', 'transport', 'others'].map(catKey => {
                                        const category = expensesByCategory[catKey];
                                        if (category.total === 0) return null;
                                        return (
                                            <div key={catKey} className="bg-white rounded-2xl shadow-sm border border-stone-100 overflow-hidden">
                                                <button onClick={() => toggleCategory(catKey)} className="w-full flex justify-between items-center p-4 bg-white hover:bg-stone-50 transition-colors">
                                                    <div className="flex items-center gap-3">
                                                        <div className={`w-10 h-10 rounded-full flex items-center justify-center ${category.color.bg} ${category.color.text}`}>
                                                            {catKey === 'shop' && <ShoppingBag size={18} />}{catKey === 'food' && <Utensils size={18} />}{catKey === 'transport' && <Car size={18} />}{catKey === 'others' && <Home size={18} />}
                                                        </div>
                                                        <div className="text-left"><h4 className="font-bold text-stone-700 text-sm">{category.label}</h4><p className="text-xs text-stone-400">{category.items.length}건</p></div>
                                                    </div>
                                                    <div className="flex items-center gap-2"><span className="font-bold text-stone-700 text-sm">{category.total.toLocaleString()} €</span>{expandedCategory === catKey ? <ChevronUp size={16} className="text-stone-300"/> : <ChevronDown size={16} className="text-stone-300"/>}</div>
                                                </button>
                                                {expandedCategory === catKey && (
                                                    <div className="bg-stone-50 p-4 border-t border-stone-100 space-y-3">
                                                        {category.items.map((item, idx) => (
                                                            <div key={idx} className="flex justify-between items-start text-sm">
                                                                <div className="flex-1 pr-4">
                                                                    <div className="flex items-center gap-2"><span className="text-[10px] font-bold text-stone-400 bg-white px-1.5 rounded border border-stone-200">{item.date.split(' ')[0]}</span><span className="font-medium text-stone-700">{item.title}</span></div>
                                                                    {(item.items?.length > 0 || item.menu) && <p className="text-xs text-stone-400 mt-1 pl-1 border-l-2 border-stone-200">{item.menu || item.items.join(', ')}</p>}
                                                                </div>
                                                                <span className="font-bold text-stone-600 shrink-0">{item.cost.toLocaleString()} €</span>
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Modals */}
                    {/* Add/Edit Modal */}
                    {isModalOpen && (
                        <div className="absolute inset-0 z-50 flex items-end sm:items-center justify-center bg-black/40 backdrop-blur-[2px]">
                            <div className="bg-white w-full max-w-md p-6 rounded-t-3xl sm:rounded-3xl shadow-xl animate-in slide-in-from-bottom-10 duration-300">
                                <div className="flex justify-between items-center mb-6"><h3 className="font-bold text-lg text-stone-800">{editingEventId ? '일정 수정' : '새로운 일정'}</h3><button onClick={() => setIsModalOpen(false)} className="p-2 bg-stone-100 rounded-full text-stone-500"><X size={18}/></button></div>
                                <div className="space-y-4">
                                    <div className="grid grid-cols-5 gap-2">{['food','visit','shop','transport','etc'].map(type => (
                                        <button key={type} onClick={() => setNewEntry({...newEntry, type})} className={`py-2.5 rounded-xl text-xs font-bold transition-all border ${newEntry.type === type ? 'bg-stone-800 text-white border-stone-800 shadow-md' : 'bg-white text-stone-400 border-stone-100 hover:bg-stone-50'}`}>{type === 'food' ? '식사/카페' : type === 'visit' ? '관광' : type === 'shop' ? '쇼핑' : type === 'transport' ? '이동' : '숙소/기타'}</button>
                                    ))}</div>
                                    <div className="space-y-1"><label className="text-[10px] font-bold text-stone-400 uppercase">Title</label><input className="w-full bg-stone-50 p-3 rounded-xl text-sm font-medium outline-none focus:ring-2 focus:ring-lime-200" placeholder="장소명 입력" value={newEntry.title} onChange={e => setNewEntry({...newEntry, title: e.target.value})}/></div>
                                    <div className="flex gap-3">
                                        <div className="flex-1 space-y-1"><label className="text-[10px] font-bold text-stone-400 uppercase">Time</label><input type="time" className="w-full bg-stone-50 p-3 rounded-xl text-sm outline-none focus:ring-2 focus:ring-lime-200" value={newEntry.time} onChange={e => setNewEntry({...newEntry, time: e.target.value})}/></div>
                                        <div className="flex-1 space-y-1"><label className="text-[10px] font-bold text-stone-400 uppercase">Cost (EUR)</label><input type="number" className="w-full bg-stone-50 p-3 rounded-xl text-sm outline-none focus:ring-2 focus:ring-lime-200" placeholder="0" value={newEntry.cost} onChange={e => setNewEntry({...newEntry, cost: e.target.value})}/></div>
                                    </div>
                                    {(newEntry.type === 'shop' || newEntry.type === 'food') && <div className="space-y-1"><label className="text-[10px] font-bold text-stone-400 uppercase">{newEntry.type === 'shop' ? 'Items' : 'Menu'}</label><input className="w-full bg-stone-50 p-3 rounded-xl text-sm outline-none focus:ring-2 focus:ring-lime-200" placeholder="콤마(,)로 구분" value={newEntry.items} onChange={e => setNewEntry({...newEntry, items: e.target.value})}/></div>}
                                    <div className="space-y-1"><label className="text-[10px] font-bold text-stone-400 uppercase">Google Map Link</label><input className="w-full bg-stone-50 p-3 rounded-xl text-sm outline-none focus:ring-2 focus:ring-lime-200" placeholder="선택사항" value={newEntry.link} onChange={e => setNewEntry({...newEntry, link: e.target.value})}/></div>
                                    <div className="space-y-1"><label className="text-[10px] font-bold text-stone-400 uppercase">Memo</label><textarea className="w-full bg-stone-50 p-3 rounded-xl text-sm outline-none focus:ring-2 focus:ring-lime-200 resize-none h-20" placeholder="간단한 메모를 남겨주세요" value={newEntry.note} onChange={e => setNewEntry({...newEntry, note: e.target.value})}/></div>
                                    <button onClick={handleSaveEntry} className="w-full bg-lime-400 text-lime-900 py-4 rounded-xl font-bold shadow-lg shadow-lime-200 hover:bg-lime-500 hover:text-white transition-all">저장하기</button>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {/* Calculator Modal */}
                    {isConverterOpen && (
                        <div className="absolute inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-[2px]">
                            <div className="bg-white w-full max-w-xs p-6 rounded-3xl shadow-xl transform transition-all scale-100">
                                <div className="flex justify-between items-center mb-6"><h3 className="font-bold text-lg text-stone-800 flex items-center gap-2"><Calculator size={18} className="text-purple-500"/> 환율 계산기</h3><button onClick={() => setIsConverterOpen(false)} className="p-2 bg-stone-100 rounded-full text-stone-500"><X size={16}/></button></div>
                                <div className="bg-stone-50 p-4 rounded-2xl mb-4">
                                    <div className="flex justify-between items-center text-xs font-bold text-stone-400 mb-2 uppercase tracking-wider">
                                        <span>1 EUR = {exchangeRate} KRW</span>
                                        <button onClick={handleRefreshRate} className={`flex items-center gap-1 ${isRateLive ? 'text-green-500' : 'text-stone-400'}`}>
                                            {isRateLive ? 'Live' : 'Manual'} <RefreshCw size={10} />
                                        </button>
                                    </div>
                                    <input type="range" min="1300" max="1600" step="10" value={exchangeRate} onChange={(e) => {setExchangeRate(Number(e.target.value)); setIsRateLive(false);}} className="w-full accent-purple-500"/>
                                </div>
                                <div className="space-y-4">
                                    <div className="relative"><label className="text-[10px] font-bold text-stone-400 absolute top-2 left-3">EUR (유로)</label><input type="number" className="w-full bg-white border border-stone-200 p-3 pt-6 rounded-xl text-lg font-bold outline-none focus:border-purple-300 focus:ring-2 focus:ring-purple-100" placeholder="0" value={convertValues.eur} onChange={handleEurChange}/></div>
                                    <div className="flex justify-center -my-2 relative z-10"><div className="bg-stone-100 p-2 rounded-full border border-white shadow-sm"><ArrowRightLeft size={16} className="text-stone-400"/></div></div>
                                    <div className="relative"><label className="text-[10px] font-bold text-stone-400 absolute top-2 left-3">KRW (원)</label><input type="number" className="w-full bg-white border border-stone-200 p-3 pt-6 rounded-xl text-lg font-bold outline-none focus:border-purple-300 focus:ring-2 focus:ring-purple-100" placeholder="0" value={convertValues.krw} onChange={handleKrwChange}/></div>
                                </div>
                                <button onClick={() => setConvertValues({eur: '', krw: ''})} className="w-full mt-6 py-3 rounded-xl bg-stone-100 text-stone-500 font-bold text-sm hover:bg-stone-200">초기화</button>
                            </div>
                        </div>
                    )}
                    
                    {/* Budget Setting Modal */}
                    {isBudgetModalOpen && (
                         <div className="absolute inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-[2px]">
                            <div className="bg-white w-full max-w-xs p-6 rounded-2xl shadow-xl animate-in zoom-in-95 duration-200">
                                <h3 className="text-lg font-bold text-stone-800 mb-4 flex items-center gap-2"><Wallet size={18} className="text-emerald-500"/>예산 설정</h3>
                                <p className="text-stone-500 text-xs mb-4">환전한 총 금액(유로)을 입력해주세요.</p>
                                <div className="relative mb-6">
                                    <label className="text-[10px] font-bold text-stone-400 absolute top-2 left-3">Total Budget (EUR)</label>
                                    <input type="number" className="w-full bg-stone-50 p-3 pt-6 rounded-xl text-lg font-bold outline-none focus:ring-2 focus:ring-emerald-200" placeholder="0" value={totalBudget || ''} onChange={(e) => setTotalBudget(Number(e.target.value))} />
                                </div>
                                <button onClick={() => setIsBudgetModalOpen(false)} className="w-full py-3 rounded-xl bg-emerald-500 text-white font-bold text-sm hover:bg-emerald-600 shadow-lg shadow-emerald-200 transition-colors">저장하기</button>
                            </div>
                        </div>
                    )}

                    {/* Delete Confirmation Modal */}
                    {deleteTarget && (
                        <div className="absolute inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-6">
                            <div className="bg-white w-full max-w-sm p-6 rounded-2xl shadow-xl animate-in zoom-in-95 duration-200">
                                <h3 className="text-lg font-bold text-stone-800 mb-2">일정 삭제</h3><p className="text-stone-500 text-sm mb-6">정말로 이 일정을 삭제하시겠습니까?<br/><span className="text-xs text-stone-400">이 작업은 되돌릴 수 없습니다.</span></p>
                                <div className="flex gap-3"><button onClick={cancelDelete} className="flex-1 py-3 rounded-xl bg-stone-100 text-stone-600 font-bold text-sm hover:bg-stone-200 transition-colors">취소</button><button onClick={confirmDelete} className="flex-1 py-3 rounded-xl bg-red-500 text-white font-bold text-sm hover:bg-red-600 shadow-lg shadow-red-200 transition-colors">삭제</button></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TripPlanner />);
    </script>
</body>
</html>
