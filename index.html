<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Trip Planner ✈️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #FDFCF8; }
        .font-cooper { font-family: 'Cooper Black', serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- 아이콘 컴포넌트 (오타 수정 완료) ---
        const IconBase = ({ children, size = 18, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );
        const Plus = (props) => <IconBase {...props}><path d="M5 12h14"/><path d="M12 5v14"/></IconBase>;
        const X = (props) => <IconBase {...props}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></IconBase>;
        const Trash2 = (props) => <IconBase {...props}><path d="M3 6h18"/><path d="M19 6v14c0 1.1-.9 2-2 2H7c-1.1 0-2-.9-2-2V6"/><path d="M8 6V4c0-1.1.9-2 2-2h4c1.1 0 2 .9 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></IconBase>;
        const MapPin = (props) => <IconBase {...props}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></IconBase>;
        const Utensils = (props) => <IconBase {...props}><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></IconBase>;

        const TripPlanner = () => {
            const [destination, setDestination] = useState(() => localStorage.getItem('tripDest') || 'Europe Trip ✈️');
            const [days, setDays] = useState(() => {
                const saved = localStorage.getItem('tripDaysV3');
                return saved ? JSON.parse(saved) : [{ id: 1, title: "1일차", events: [] }];
            });
            const [selectedDayId, setSelectedDayId] = useState(days[0]?.id);
            const [exchangeRate, setExchangeRate] = useState(1719); 
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [newEntry, setNewEntry] = useState({ type: 'visit', title: '', time: '12:00', cost: '', note: '' });

            // 실시간 환율 연동 (구글 기준과 가장 유사한 금융 데이터 API)
            useEffect(() => {
                fetch('https://api.exchangerate-api.com/v4/latest/EUR')
                    .then(res => res.json())
                    .then(data => { if(data.rates.KRW) setExchangeRate(data.rates.KRW); })
                    .catch(err => console.error("환율 로드 실패:", err));
            }, []);

            useEffect(() => {
                localStorage.setItem('tripDaysV3', JSON.stringify(days));
                localStorage.setItem('tripDest', destination);
            }, [days, destination]);

            // 숙박 일정 추가/삭제 기능
            const addDay = () => {
                const newDay = { id: Date.now(), title: `${days.length + 1}일차`, events: [] };
                setDays([...days, newDay]);
                setSelectedDayId(newDay.id);
            };

            const removeDay = (id, e) => {
                e.stopPropagation();
                if (days.length === 1) return;
                if (confirm("이 날의 모든 일정이 삭제됩니다.")) {
                    const filtered = days.filter(d => d.id !== id);
                    setDays(filtered);
                    if (selectedDayId === id) setSelectedDayId(filtered[0].id);
                }
            };

            const handleSaveEvent = () => {
                if (!newEntry.title) return;
                setDays(prev => prev.map(d => d.id === selectedDayId ? {
                    ...d, events: [...d.events, { ...newEntry, id: Date.now(), cost: Number(newEntry.cost) || 0 }].sort((a,b) => a.time.localeCompare(b.time))
                } : d));
                setIsModalOpen(false);
                setNewEntry({ type: 'visit', title: '', time: '12:00', cost: '', note: '' });
            };

            const currentDay = days.find(d => d.id === selectedDayId) || days[0];
            const totalSpent = days.reduce((acc, d) => acc + d.events.reduce((s, e) => s + (e.cost || 0), 0), 0);

            return (
                <div className="max-w-md mx-auto h-screen bg-[#FDFCF8] flex flex-col">
                    <header className="p-5 bg-white border-b border-stone-100">
                        <div className="flex justify-between items-center mb-4">
                            <input className="font-cooper text-xl bg-transparent outline-none w-2/3" value={destination} onChange={e => setDestination(e.target.value)} />
                            <div className="text-right">
                                <p className="text-[10px] font-bold text-stone-400 uppercase">Total</p>
                                <p className="text-lg font-bold">{totalSpent.toLocaleString()} €</p>
                                <p className="text-[10px] text-emerald-600 font-bold">≈ {(totalSpent * exchangeRate).toLocaleString()}원</p>
                            </div>
                        </div>
                        {/* 날짜 탭 관리 영역 */}
                        <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                            {days.map((day, idx) => (
                                <div key={day.id} onClick={() => setSelectedDayId(day.id)} 
                                     className={`relative flex-shrink-0 px-4 py-2 rounded-xl border transition-all cursor-pointer ${selectedDayId === day.id ? 'bg-black text-white border-black' : 'bg-white border-stone-200 text-stone-400'}`}>
                                    <span className="text-xs font-bold">{idx + 1}일차</span>
                                    {days.length > 1 && (
                                        <button onClick={(e) => removeDay(day.id, e)} className="absolute -top-1 -right-1 bg-red-500 text-white rounded-full p-0.5 hover:scale-110">
                                            <X size={8}/>
                                        </button>
                                    )}
                                </div>
                            ))}
                            <button onClick={addDay} className="flex-shrink-0 px-4 py-2 rounded-xl border-2 border-dashed border-stone-200 text-stone-400 hover:border-stone-400 transition-colors">
                                <Plus size={16}/>
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto p-4 pb-24">
                        <div className="bg-stone-900 text-white p-5 rounded-2xl mb-6 shadow-xl flex justify-between items-center">
                             <input className="bg-transparent font-bold text-lg outline-none w-full" value={currentDay.title} 
                                    onChange={e => setDays(days.map(d => d.id === selectedDayId ? {...d, title: e.target.value} : d))} />
                        </div>

                        <div className="space-y-4">
                            {currentDay.events.length === 0 && <p className="text-center text-stone-300 py-10 text-sm">등록된 일정이 없습니다.</p>}
                            {currentDay.events.map(event => (
                                <div key={event.id} className="bg-white p-4 rounded-2xl border border-stone-100 shadow-sm flex gap-4 animate-in fade-in slide-in-from-bottom-2">
                                    <div className={`w-10 h-10 rounded-full flex items-center justify-center ${event.type === 'food' ? 'bg-orange-100 text-orange-500' : 'bg-blue-100 text-blue-500'}`}>
                                        {event.type === 'food' ? <Utensils size={18}/> : <MapPin size={18}/>}
                                    </div>
                                    <div className="flex-1">
                                        <div className="flex justify-between items-start">
                                            <span className="text-[10px] font-bold text-stone-400 bg-stone-50 px-2 py-0.5 rounded">{event.time}</span>
                                            <span className="text-sm font-bold text-stone-700">{event.cost.toLocaleString()} €</span>
                                        </div>
                                        <h4 className="font-bold text-sm mt-1">{event.title}</h4>
                                        {event.note && <p className="text-xs text-stone-400 mt-1">{event.note}</p>}
                                    </div>
                                </div>
                            ))}
                            <button onClick={() => setIsModalOpen(true)} className="w-full py-4 rounded-2xl border-2 border-dashed border-stone-200 text-stone-400 font-bold text-sm hover:bg-stone-50 transition-all">+ 일정 추가</button>
                        </div>
                    </main>

                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-end z-50">
                            <div className="bg-white w-full rounded-t-3xl p-6 shadow-2xl animate-in slide-in-from-bottom duration-300">
                                <div className="flex justify-between items-center mb-6"><h3 className="font-bold text-lg">새 일정 기록</h3><button onClick={() => setIsModalOpen(false)}><X/></button></div>
                                <div className="space-y-4">
                                    <div className="flex gap-2">
                                        {['visit', 'food'].map(t => (
                                            <button key={t} onClick={() => setNewEntry({...newEntry, type: t})} className={`flex-1 py-2 rounded-xl text-xs font-bold border ${newEntry.type === t ? 'bg-stone-900 text-white border-stone-900' : 'bg-white text-stone-400 border-stone-200'}`}>
                                                {t === 'visit' ? '관광/이동' : '식사/카페'}
                                            </button>
                                        ))}
                                    </div>
                                    <input className="w-full p-4 bg-stone-50 rounded-2xl outline-none focus:ring-2 focus:ring-stone-200" placeholder="어디에 가시나요?" value={newEntry.title} onChange={e => setNewEntry({...newEntry, title: e.target.value})} />
                                    <div className="flex gap-3">
                                        <div className="flex-1"><label className="text-[10px] font-bold text-stone-400 ml-2">시간</label><input type="time" className="w-full p-4 bg-stone-50 rounded-2xl outline-none" value={newEntry.time} onChange={e => setNewEntry({...newEntry, time: e.target.value})} /></div>
                                        <div className="flex-1"><label className="text-[10px] font-bold text-stone-400 ml-2">비용 (€)</label><input type="number" className="w-full p-4 bg-stone-50 rounded-2xl outline-none" placeholder="0" value={newEntry.cost} onChange={e => setNewEntry({...newEntry, cost: e.target.value})} /></div>
                                    </div>
                                    <textarea className="w-full p-4 bg-stone-50 rounded-2xl outline-none h-24 resize-none" placeholder="간단한 메모 (선택)" value={newEntry.note} onChange={e => setNewEntry({...newEntry, note: e.target.value})} />
                                    <button onClick={handleSaveEvent} className="w-full py-5 bg-lime-400 text-lime-900 font-bold rounded-2xl shadow-lg shadow-lime-100 hover:bg-lime-500 transition-all">일정 저장하기</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TripPlanner />);
    </script>
</body>
</html>
