<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Trip Planner ✈️</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Chonburi&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #FDFCF8; }
        .font-cooper { font-family: 'Cooper Black', 'Chonburi', serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- Icon Components ---
        const IconBase = ({ children, size = 18, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );
        const MapPin = (props) => <IconBase {...props}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></IconBase>;
        const Utensils = (props) => <IconBase {...props}><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></IconBase>;
        const ShoppingBag = (props) => <IconBase {...props}><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></IconBase>;
        const Car = (props) => <IconBase {...props}><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><path d="M9 17h6"/><circle cx="17" cy="17" r="2"/></IconBase>;
        const Plus = (props) => <IconBase {...props}><path d="M5 12h14"/><path d="M12 5v14"/></IconBase>;
        const X = (props) => <IconBase {...props}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></IconBase>;
        const ExternalLink = (props) => <IconBase {...props}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" x2="21" y1="14" y2="3"/></IconBase>;
        const Edit2 = (props) => <IconBase {...props}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></IconBase>;
        const Trash2 = (props) => <IconBase {...props}><path d="M3 6h18"/><path d="M19 6v14c0 1.1-.9 2-2 2H7c-1.1 0-2-.9-2-2V6"/><path d="M8 6V4c0-1.1.9-2 2-2h4c1.1 0 2 .9 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></IconBase>;
        const Home = (props) => <IconBase {...props}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></IconBase>;
        const Calculator = (props) => <IconBase {...props}><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></IconBase>;
        const ArrowRightLeft = (props) => <IconBase {...props}><path d="m16 3 4 4-4 4"/><path d="M20 7H4"/><path d="m8 21-4-4 4-4"/><path d="M4 17h16"/></IconBase>;
        const RefreshCw = (props) => <IconBase {...props}><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></IconBase>;
        const Pencil = (props) => <IconBase {...props}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></IconBase>;
        const Wallet = (props) => <IconBase {...props}><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></IconBase>;

        const TripPlanner = () => {
            const [activeTab, setActiveTab] = useState('itinerary'); 
            const [days, setDays] = useState(() => {
                const saved = localStorage.getItem('dynamicTripData');
                return saved ? JSON.parse(saved) : [
                    { id: 1, date: "4/15 (월)", title: "도착 & 시내 구경", events: [] }
                ];
            });
            const [selectedDayId, setSelectedDayId] = useState(days[0]?.id || 1);
            const [destination, setDestination] = useState(() => localStorage.getItem('dynamicTripDest') || 'Paris Trip ✈️');
            const [isEditingDest, setIsEditingDest] = useState(false);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isConverterOpen, setIsConverterOpen] = useState(false);
            const [isBudgetModalOpen, setIsBudgetModalOpen] = useState(false);
            const [deleteTarget, setDeleteTarget] = useState(null);
            const [editingEventId, setEditingEventId] = useState(null);
            const [expandedCategory, setExpandedCategory] = useState(null);
            const [exchangeRate, setExchangeRate] = useState(1450);
            const [isRateLive, setIsRateLive] = useState(false);
            const [convertValues, setConvertValues] = useState({ eur: '', krw: '' });
            const [totalBudget, setTotalBudget] = useState(() => Number(localStorage.getItem('dynamicTripBudget')) || 0);

            useEffect(() => { localStorage.setItem('dynamicTripData', JSON.stringify(days)); }, [days]);
            useEffect(() => { localStorage.setItem('dynamicTripBudget', totalBudget); }, [totalBudget]);
            useEffect(() => { localStorage.setItem('dynamicTripDest', destination); }, [destination]);

            useEffect(() => {
                const fetchRate = async () => {
                    try {
                        const response = await fetch('https://api.exchangerate-api.com/v4/latest/EUR');
                        const data = await response.json();
                        if (data?.rates?.KRW) {
                            setExchangeRate(Math.round(data.rates.KRW * 100) / 100);
                            setIsRateLive(true);
                        }
                    } catch (e) { setIsRateLive(false); }
                };
                fetchRate();
            }, []);

            const [newEntry, setNewEntry] = useState({ type: 'food', title: '', time: '', cost: '', currency: 'EUR', note: '', link: '', items: '' });

            const addDay = () => {
                const newDayId = Date.now();
                const newDay = { 
                    id: newDayId, 
                    date: `Day ${days.length + 1}`, 
                    title: "새로운 일정", 
                    events: [] 
                };
                setDays([...days, newDay]);
                setSelectedDayId(newDayId);
            };

            const deleteDay = (id, e) => {
                e.stopPropagation();
                if (days.length <= 1) return;
                if (window.confirm("이 날의 모든 일정이 사라집니다. 삭제할까요?")) {
                    const filtered = days.filter(d => d.id !== id);
                    setDays(filtered);
                    if (selectedDayId === id) setSelectedDayId(filtered[0].id);
                }
            };

            const handleSaveEntry = () => {
                if (!newEntry.title) return;
                const processedItems = (newEntry.type === 'shop' || newEntry.type === 'food') && newEntry.items ? newEntry.items.split(',').map(i => i.trim()) : [];
                const eventData = {
                    type: newEntry.type, title: newEntry.title, time: newEntry.time,
                    cost: newEntry.cost ? Number(newEntry.cost) : 0,
                    note: newEntry.note, link: newEntry.link,
                    items: newEntry.type === 'shop' ? processedItems : [],
                    menu: newEntry.type === 'food' ? newEntry.items : undefined
                };
                if (editingEventId) {
                    setDays(prev => prev.map(d => d.id === selectedDayId ? { ...d, events: d.events.map(ev => ev.id === editingEventId ? { ...ev, ...eventData } : ev).sort((a,b) => (a.time || '').localeCompare(b.time || '')) } : d));
                } else {
                    setDays(prev => prev.map(d => d.id === selectedDayId ? { ...d, events: [...d.events, { id: Date.now(), ...eventData }].sort((a,b) => (a.time || '').localeCompare(b.time || '')) } : d));
                }
                setIsModalOpen(false);
            };

            const currentDay = days.find(d => d.id === selectedDayId) || days[0];
            const stats = useMemo(() => days.reduce((acc, d) => acc + d.events.reduce((s, e) => s + (e.cost || 0), 0), 0), [days]);
            const remainingBudget = totalBudget - stats;
            const spendPercent = totalBudget > 0 ? Math.min(100, (stats / totalBudget) * 100) : 0;

            const getCategoryColor = (type) => {
                const colors = { blue: { bg: "bg-sky-100", text: "text-sky-600", border: "border-sky-200" }, green: { bg: "bg-lime-100", text: "text-lime-700", border: "border-lime-200" }, purple: { bg: "bg-purple-100", text: "text-purple-600", border: "border-purple-200" }, orange: { bg: "bg-orange-50", text: "text-orange-600", border: "border-orange-100" }, pink: { bg: "bg-rose-50", text: "text-rose-500", border: "border-rose-100" } };
                switch (type) { case 'shop': return colors.purple; case 'transport': return colors.blue; case 'food': return colors.orange; case 'etc': return colors.pink; default: return colors.green; }
            };

            const getIcon = (type) => {
                const className = `w-5 h-5 ${getCategoryColor(type).text}`;
                switch (type) { case 'food': return <Utensils className={className} />; case 'shop': return <ShoppingBag className={className} />; case 'transport': return <Car className={className} />; case 'etc': return <Home className={className} />; default: return <MapPin className={className} />; }
            };

            return (
                <div className={`max-w-md mx-auto h-screen bg-[#FDFCF8] flex flex-col font-sans text-slate-700`}>
                    <header className="px-4 pt-6 pb-2 bg-white/90 backdrop-blur-md sticky top-0 z-30 border-b border-stone-100 shadow-sm">
                        <div className="flex justify-between items-center mb-3">
                            <div className="flex items-center gap-1 flex-1">
                                {isEditingDest ? (
                                    <input autoFocus type="text" value={destination} onChange={(e) => setDestination(e.target.value)} onBlur={() => setIsEditingDest(false)} onKeyDown={(e) => e.key === 'Enter' && setIsEditingDest(false)} className="text-xl text-stone-800 tracking-tight font-cooper bg-transparent border-b border-stone-300 outline-none w-4/5" />
                                ) : (
                                    <h1 onClick={() => setIsEditingDest(true)} className="text-xl text-stone-800 tracking-tight font-cooper cursor-pointer hover:opacity-70 truncate flex items-center gap-2"> {destination} <Pencil size={12} className="text-stone-300" /> </h1>
                                )}
                            </div>
                            <div className="flex items-center gap-3 shrink-0">
                                <button onClick={() => setIsConverterOpen(true)} className="p-2 bg-stone-100 rounded-full text-stone-600 hover:bg-stone-200 transition-colors"><Calculator size={18} /></button>
                                <div className="text-right">
                                    <span className="text-[10px] font-bold text-stone-400 block uppercase tracking-wider">Total Spent</span>
                                    <span className="text-lg font-bold text-stone-700 leading-none">{stats.toLocaleString()} €</span>
                                </div>
                            </div>
                        </div>
                        {/* Day Management Header */}
                        <div className="flex items-center gap-2 overflow-x-auto py-2 scrollbar-hide">
                            {days.map((day, idx) => (
                                <div key={day.id} className="relative group shrink-0">
                                    <button onClick={() => setSelectedDayId(day.id)} className={`flex flex-col items-center justify-center min-w-[56px] h-[56px] rounded-xl transition-all border ${selectedDayId === day.id ? 'bg-lime-100 border-lime-300 text-lime-800 shadow-sm scale-105' : 'bg-white border-stone-100 text-stone-400'}`}>
                                        <span className="text-[10px] font-bold uppercase">DAY</span>
                                        <span className="text-sm font-bold">{idx + 1}</span>
                                    </button>
                                    {days.length > 1 && (
                                        <button onClick={(e) => deleteDay(day.id, e)} className="absolute -top-1 -right-1 bg-red-400 text-white rounded-full p-0.5 opacity-0 group-hover:opacity-100 transition-opacity"><X size={10} /></button>
                                    )}
                                </div>
                            ))}
                            <button onClick={addDay} className="flex flex-col items-center justify-center min-w-[56px] h-[56px] rounded-xl border-2 border-dashed border-stone-200 text-stone-300 hover:bg-stone-50 transition-all shrink-0"><Plus size={20} /></button>
                        </div>
                        <div className="flex p-1 bg-stone-100 rounded-xl mt-2">
                            <button onClick={() => setActiveTab('itinerary')} className={`flex-1 py-2 text-xs font-bold rounded-lg transition-all ${activeTab === 'itinerary' ? 'bg-white text-stone-800 shadow-sm' : 'text-stone-400'}`}>여행 일정</button>
                            <button onClick={() => setActiveTab('shopping')} className={`flex-1 py-2 text-xs font-bold rounded-lg transition-all ${activeTab === 'shopping' ? 'bg-white text-purple-600 shadow-sm' : 'text-stone-400'}`}>카테고리 & 예산</button>
                        </div>
                    </header>

                    <div className="flex-1 overflow-y-auto px-4 pb-24">
                        {activeTab === 'itinerary' && currentDay && (
                            <div className="mt-4">
                                <div className="bg-stone-800 text-white p-4 rounded-2xl mb-5 flex justify-between items-center shadow-lg">
                                    <input className="bg-transparent font-bold text-lg outline-none w-full" value={currentDay.date} onChange={(e) => {
                                        const val = e.target.value;
                                        setDays(prev => prev.map(d => d.id === selectedDayId ? {...d, date: val} : d));
                                    }} />
                                    <div className="bg-white/10 px-3 py-1.5 rounded-lg border border-white/10 ml-2 shrink-0"><span className="font-bold text-sm uppercase">Selected</span></div>
                                </div>
                                <div className="space-y-4">
                                    {currentDay.events.map((event, index) => {
                                        const style = getCategoryColor(event.type);
                                        return (
                                            <div key={event.id} className="relative pl-3">
                                                {index !== currentDay.events.length - 1 && <div className="absolute left-[22px] top-10 bottom-[-24px] w-[2px] bg-stone-100"></div>}
                                                <div className="flex gap-3">
                                                    <div className={`shrink-0 w-10 h-10 rounded-full ${style.bg} flex items-center justify-center border-2 border-white shadow-sm z-10`}>{getIcon(event.type)}</div>
                                                    <div className={`flex-1 bg-white p-4 rounded-2xl border ${style.border} shadow-sm relative`}>
                                                        <div className="absolute top-3 right-3 flex gap-2">
                                                            <button onClick={() => { setEditingEventId(event.id); setNewEntry({...event, items: event.items?.join(', ') || event.menu || ''}); setIsModalOpen(true); }} className="p-1.5 bg-stone-50 rounded-full text-stone-400 hover:text-sky-500 transition-colors"><Edit2 size={12}/></button>
                                                            <button onClick={(e) => { e.stopPropagation(); setDays(prev => prev.map(d => d.id === selectedDayId ? { ...d, events: d.events.filter(ev => ev.id !== event.id) } : d)); }} className="p-1.5 bg-stone-50 rounded-full text-stone-400 hover:text-red-500 transition-colors"><Trash2 size={12}/></button>
                                                        </div>
                                                        <div className="flex items-center gap-2 mb-1 pr-14"><span className={`text-[10px] font-bold px-2 py-0.5 rounded-md ${style.bg} ${style.text}`}>{event.time || 'Time'}</span></div>
                                                        <h3 className="font-bold text-stone-700 pr-2 text-sm">{event.title}</h3>
                                                        {event.note && <p className="text-xs text-stone-400 mt-1">{event.note}</p>}
                                                        {event.cost > 0 && <div className="mt-3 pt-3 border-t border-stone-50"><div className="text-xs font-bold text-stone-600 bg-stone-100 px-2 py-1 rounded inline-block">-{event.cost.toLocaleString()} €</div></div>}
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                    <button onClick={() => { setEditingEventId(null); setIsModalOpen(true); }} className="w-full py-3.5 rounded-xl border-2 border-dashed border-stone-300 text-stone-400 font-bold text-sm hover:border-lime-400 hover:text-lime-600 hover:bg-lime-50 transition-all flex items-center justify-center gap-2"><Plus size={16} /> 일정 추가</button>
                                </div>
                            </div>
                        )}
                        {/* Shopping & Summary Tab Logic can be added back here if needed */}
                    </div>

                    {/* Modal (Add/Edit) */}
                    {isModalOpen && (
                        <div className="absolute inset-0 z-50 flex items-end sm:items-center justify-center bg-black/40 backdrop-blur-[2px]">
                            <div className="bg-white w-full max-w-md p-6 rounded-t-3xl sm:rounded-3xl shadow-xl animate-in slide-in-from-bottom-10 duration-300">
                                <div className="flex justify-between items-center mb-6"><h3 className="font-bold text-lg">{editingEventId ? '일정 수정' : '새로운 일정'}</h3><button onClick={() => setIsModalOpen(false)}><X size={18}/></button></div>
                                <div className="space-y-4">
                                    <div className="grid grid-cols-5 gap-2">{['food','visit','shop','transport','etc'].map(t => (
                                        <button key={t} onClick={() => setNewEntry({...newEntry, type: t})} className={`py-2 rounded-xl text-[10px] font-bold border ${newEntry.type === t ? 'bg-stone-800 text-white' : 'bg-white text-stone-400'}`}>{t.toUpperCase()}</button>
                                    ))}</div>
                                    <input className="w-full bg-stone-50 p-3 rounded-xl text-sm outline-none" placeholder="장소명" value={newEntry.title} onChange={e => setNewEntry({...newEntry, title: e.target.value})}/>
                                    <div className="flex gap-3">
                                        <input type="time" className="flex-1 bg-stone-50 p-3 rounded-xl text-sm outline-none" value={newEntry.time} onChange={e => setNewEntry({...newEntry, time: e.target.value})}/>
                                        <input type="number" className="flex-1 bg-stone-50 p-3 rounded-xl text-sm outline-none" placeholder="비용(EUR)" value={newEntry.cost} onChange={e => setNewEntry({...newEntry, cost: e.target.value})}/>
                                    </div>
                                    <textarea className="w-full bg-stone-50 p-3 rounded-xl text-sm outline-none h-20" placeholder="메모" value={newEntry.note} onChange={e => setNewEntry({...newEntry, note: e.target.value})}/>
                                    <button onClick={handleSaveEntry} className="w-full bg-lime-400 text-lime-900 py-4 rounded-xl font-bold shadow-lg">저장하기</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TripPlanner />);
    </script>
</body>
</html>
