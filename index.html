<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Trip Planner 🥥</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Chonburi&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #FDFCF8; }
        .font-cooper { font-family: 'Cooper Black', 'Chonburi', serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Icons ---
        const IconBase = ({ children, size = 18, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );
        const MapPin = (props) => <IconBase {...props}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></IconBase>;
        const Utensils = (props) => <IconBase {...props}><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></IconBase>;
        const ShoppingBag = (props) => <IconBase {...props}><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></IconBase>;
        const Car = (props) => <IconBase {...props}><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><path d="M9 17h6"/><circle cx="17" cy="17" r="2"/></IconBase>;
        const Plus = (props) => <IconBase {...props}><path d="M5 12h14"/><path d="M12 5v14"/></IconBase>;
        const X = (props) => <IconBase {...props}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></IconBase>;
        const Edit2 = (props) => <IconBase {...props}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></IconBase>;
        const Trash2 = (props) => <IconBase {...props}><path d="M3 6h18"/><path d="M19 6v14c0 1.1-.9 2-2 2H7c-1.1 0-2-.9-2-2V6"/><path d="M8 6V4c0-1.1.9-2 2-2h4c1.1 0 2 .9 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></IconBase>;
        const Home = (props) => <IconBase {...props}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></IconBase>;
        const Calculator = (props) => <IconBase {...props}><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></IconBase>;
        const ArrowRightLeft = (props) => <IconBase {...props}><path d="m16 3 4 4-4 4"/><path d="M20 7H4"/><path d="m8 21-4-4 4-4"/><path d="M4 17h16"/></IconBase>;
        const Wallet = (props) => <IconBase {...props}><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></IconBase>;
        const ChevronDown = (props) => <IconBase {...props}><path d="m6 9 6 6 6-6"/></IconBase>;
        const ChevronUp = (props) => <IconBase {...props}><path d="m18 15-6-6-6 6"/></IconBase>;

        const TripPlanner = () => {
            const [activeTab, setActiveTab] = useState('itinerary'); 
            const [destination, setDestination] = useState(() => localStorage.getItem('tripDestV6') || 'Europe Trip ✈️');
            const [days, setDays] = useState(() => {
                const saved = localStorage.getItem('tripDaysV6');
                return saved ? JSON.parse(saved) : [{ id: Date.now(), title: "Day 1", events: [] }];
            });
            const [selectedDayId, setSelectedDayId] = useState(days[0]?.id);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isConverterOpen, setIsConverterOpen] = useState(false);
            const [isBudgetModalOpen, setIsBudgetModalOpen] = useState(false);
            const [editingEventId, setEditingEventId] = useState(null);
            const [expandedCategory, setExpandedCategory] = useState(null);
            const [exchangeRate, setExchangeRate] = useState(1719); 
            const [totalBudget, setTotalBudget] = useState(() => Number(localStorage.getItem('tripBudgetV6')) || 0);
            const [newEntry, setNewEntry] = useState({ type: 'visit', title: '', time: '12:00', cost: '', note: '' });
            const [convertValues, setConvertValues] = useState({ eur: '', krw: '' });

            useEffect(() => { localStorage.setItem('tripDaysV6', JSON.stringify(days)); }, [days]);
            useEffect(() => { localStorage.setItem('tripBudgetV6', totalBudget); }, [totalBudget]);
            useEffect(() => { localStorage.setItem('tripDestV6', destination); }, [destination]);

            useEffect(() => {
                fetch('https://api.exchangerate-api.com/v4/latest/EUR')
                    .then(res => res.json())
                    .then(data => { if(data?.rates?.KRW) setExchangeRate(data.rates.KRW); })
                    .catch(err => console.error(err));
            }, []);

            const addDay = () => {
                const newId = Date.now();
                setDays([...days, { id: newId, title: `Day ${days.length + 1}`, events: [] }]);
                setSelectedDayId(newId);
            };

            const deleteDay = (id, e) => {
                e.stopPropagation();
                if (days.length <= 1) return;
                if (confirm("이 날의 모든 일정이 삭제됩니다.")) {
                    const filtered = days.filter(d => d.id !== id);
                    setDays(filtered);
                    if (selectedDayId === id) setSelectedDayId(filtered[0].id);
                }
            };

            const handleSaveEntry = () => {
                if (!newEntry.title) return;
                const eventData = { ...newEntry, id: Date.now(), cost: Number(newEntry.cost) || 0 };
                if (editingEventId) {
                    setDays(prev => prev.map(d => d.id === selectedDayId ? { ...d, events: d.events.map(ev => ev.id === editingEventId ? { ...ev, ...eventData } : ev).sort((a,b) => a.time.localeCompare(b.time)) } : d));
                } else {
                    setDays(prev => prev.map(d => d.id === selectedDayId ? { ...d, events: [...d.events, eventData].sort((a,b) => a.time.localeCompare(b.time)) } : d));
                }
                setIsModalOpen(false);
                setEditingEventId(null);
            };

            const currentDay = days.find(d => d.id === selectedDayId) || days[0];
            const stats = useMemo(() => days.reduce((acc, d) => acc + d.events.reduce((s, e) => s + (e.cost || 0), 0), 0), [days]);
            const spendPercent = totalBudget > 0 ? Math.min(100, (stats / totalBudget) * 100) : 0;

            const categoryStyle = {
                food: { label: '식비', color: { bg: "bg-orange-50", text: "text-orange-600", border: "border-orange-100" }, icon: (c) => <Utensils className={c} /> },
                visit: { label: '관광', color: { bg: "bg-lime-100", text: "text-lime-700", border: "border-lime-200" }, icon: (c) => <MapPin className={c} /> },
                shop: { label: '쇼핑', color: { bg: "bg-purple-100", text: "text-purple-600", border: "border-purple-200" }, icon: (c) => <ShoppingBag className={c} /> },
                transport: { label: '교통', color: { bg: "bg-sky-100", text: "text-sky-600", border: "border-sky-200" }, icon: (c) => <Car className={c} /> },
                etc: { label: '기타', color: { bg: "bg-rose-50", text: "text-rose-500", border: "border-rose-100" }, icon: (c) => <Home className={c} /> }
            };

            const expensesByCategory = useMemo(() => {
                const cats = { food: 0, visit: 0, shop: 0, transport: 0, etc: 0 };
                days.forEach(d => d.events.forEach(e => { cats[e.type] = (cats[e.type] || 0) + (e.cost || 0); }));
                return cats;
            }, [days]);

            return (
                <div className="max-w-md mx-auto h-screen bg-[#FDFCF8] flex flex-col font-sans text-slate-700">
                    <header className="px-4 pt-6 pb-2 bg-white/90 border-b border-stone-100 sticky top-0 z-30">
                        <div className="flex justify-between items-center mb-3">
                            <input className="font-cooper text-xl bg-transparent outline-none w-2/3" value={destination} onChange={e => setDestination(e.target.value)} />
                            <div className="flex items-center gap-3">
                                <button onClick={() => setIsConverterOpen(true)} className="p-2 bg-stone-100 rounded-full text-stone-600"><Calculator size={18} /></button>
                                <div className="text-right">
                                    <p className="text-[10px] font-bold text-stone-400">TOTAL</p>
                                    <p className="text-lg font-bold leading-none">{stats.toLocaleString()} €</p>
                                </div>
                            </div>
                        </div>
                        <div className="flex gap-2 overflow-x-auto pb-3 scrollbar-hide">
                            {days.map((day, idx) => (
                                <div key={day.id} className="relative group shrink-0">
                                    <button onClick={() => setSelectedDayId(day.id)} className={`flex flex-col items-center justify-center min-w-[56px] h-[56px] rounded-xl border transition-all ${selectedDayId === day.id ? 'bg-lime-100 border-lime-300 text-lime-800 shadow-sm scale-105' : 'bg-white border-stone-100 text-stone-400'}`}>
                                        <span className="text-[10px] font-bold uppercase">DAY</span><span className="text-sm font-bold">{idx + 1}</span>
                                    </button>
                                    {days.length > 1 && <button onClick={(e) => deleteDay(day.id, e)} className="absolute -top-1 -right-1 bg-red-400 text-white rounded-full p-0.5 opacity-0 group-hover:opacity-100 transition-opacity"><X size={8}/></button>}
                                </div>
                            ))}
                            <button onClick={addDay} className="min-w-[56px] h-[56px] rounded-xl border-2 border-dashed border-stone-200 text-stone-300 flex items-center justify-center hover:bg-stone-50"><Plus size={20}/></button>
                        </div>
                        <div className="flex p-1 bg-stone-100 rounded-xl mt-1">
                            <button onClick={() => setActiveTab('itinerary')} className={`flex-1 py-2 text-xs font-bold rounded-lg transition-all ${activeTab === 'itinerary' ? 'bg-white text-stone-800 shadow-sm' : 'text-stone-400'}`}>여행 일정</button>
                            <button onClick={() => setActiveTab('shopping')} className={`flex-1 py-2 text-xs font-bold rounded-lg transition-all ${activeTab === 'shopping' ? 'bg-white text-purple-600 shadow-sm' : 'text-stone-400'}`}>카테고리 & 예산</button>
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto px-4 py-5 scrollbar-hide">
                        {activeTab === 'itinerary' ? (
                            <div className="space-y-4">
                                <div className="bg-stone-800 text-white p-4 rounded-2xl mb-6 shadow-lg flex justify-between items-center">
                                    <input className="bg-transparent font-bold text-lg outline-none w-full" value={currentDay.title} onChange={e => setDays(days.map(d => d.id === selectedDayId ? {...d, title: e.target.value} : d))} />
                                    <span className="text-lime-400 font-black text-xl ml-2">D-{days.findIndex(d => d.id === selectedDayId) + 1}</span>
                                </div>
                                {currentDay.events.map((event, index) => {
                                    const info = categoryStyle[event.type] || categoryStyle.visit;
                                    return (
                                        <div key={event.id} className="relative pl-3">
                                            {index !== currentDay.events.length - 1 && <div className="absolute left-[22px] top-10 bottom-[-24px] w-[2px] bg-stone-100"></div>}
                                            <div className="flex gap-3">
                                                <div className={`shrink-0 w-10 h-10 rounded-full ${info.color.bg} flex items-center justify-center border-2 border-white shadow-sm z-10`}>{info.icon(info.color.text)}</div>
                                                <div className={`flex-1 bg-white p-4 rounded-2xl border ${info.color.border} shadow-sm relative`}>
                                                    <div className="absolute top-3 right-3 flex gap-2">
                                                        <button onClick={() => { setEditingEventId(event.id); setNewEntry(event); setIsModalOpen(true); }} className="p-1.5 bg-stone-50 rounded-full text-stone-400 hover:text-sky-500"><Edit2 size={12}/></button>
                                                        <button onClick={() => setDays(days.map(d => d.id === selectedDayId ? {...d, events: d.events.filter(ev => ev.id !== event.id)} : d))} className="p-1.5 bg-stone-50 rounded-full text-stone-400 hover:text-red-500"><Trash2 size={12}/></button>
                                                    </div>
                                                    <div className="flex items-center gap-2 mb-1 pr-14"><span className={`text-[10px] font-bold px-2 py-0.5 rounded-md ${info.color.bg} ${info.color.text}`}>{event.time}</span></div>
                                                    <h3 className="font-bold text-stone-700 text-sm">{event.title}</h3>
                                                    {event.cost > 0 && <p className="text-xs font-bold text-stone-500 mt-2">-{event.cost.toLocaleString()} €</p>}
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                                <button onClick={() => { setEditingEventId(null); setNewEntry({type: 'visit', title: '', time: '12:00', cost: '', note: ''}); setIsModalOpen(true); }} className="w-full py-4 rounded-xl border-2 border-dashed border-stone-200 text-stone-400 font-bold text-sm hover:border-lime-400 transition-all">+ 일정 추가하기</button>
                            </div>
                        ) : (
                            <div className="space-y-5">
                                <div className="bg-white rounded-3xl p-5 shadow-sm border border-stone-100">
                                    <div className="flex justify-between items-start mb-4">
                                        <div><p className="text-stone-400 text-[10px] font-bold uppercase tracking-wider mb-1">Total Budget</p>{totalBudget === 0 ? <button onClick={() => setIsBudgetModalOpen(true)} className="text-blue-500 text-sm font-bold underline">금액 입력</button> : <h2 onClick={() => setIsBudgetModalOpen(true)} className="text-2xl font-black text-stone-800 cursor-pointer">{totalBudget.toLocaleString()} €</h2>}</div>
                                        <div className="text-right"><p className="text-stone-400 text-[10px] font-bold uppercase tracking-wider mb-1">Spent</p><h2 className="text-xl font-black text-stone-700">{stats.toLocaleString()} €</h2></div>
                                    </div>
                                    <div className="h-2.5 bg-stone-100 rounded-full overflow-hidden mb-2"><div className={`h-full transition-all duration-500 ${spendPercent > 100 ? 'bg-red-400' : 'bg-purple-400'}`} style={{width: `${spendPercent}%`}}></div></div>
                                    <div className="flex justify-between text-[10px] font-bold text-stone-400"><span>지출비율 {Math.round(spendPercent)}%</span><span>남은 예산 {(totalBudget - stats).toLocaleString()} €</span></div>
                                </div>
                                <div className="space-y-3">
                                    {Object.entries(expensesByCategory).map(([type, total]) => {
                                        if (total === 0) return null;
                                        const info = categoryStyle[type];
                                        return (
                                            <div key={type} onClick={() => setExpandedCategory(expandedCategory === type ? null : type)} className="bg-white rounded-2xl p-4 flex justify-between items-center shadow-sm border border-stone-50 cursor-pointer transition-all hover:border-stone-200">
                                                <div className="flex items-center gap-3"><div className={`w-10 h-10 rounded-full ${info.color.bg} flex items-center justify-center`}>{info.icon(info.color.text)}</div><h4 className="font-bold text-stone-700 text-sm">{info.label}</h4></div>
                                                <div className="flex items-center gap-2"><span className="font-bold text-stone-700">{total.toLocaleString()} €</span>{expandedCategory === type ? <ChevronUp size={14}/> : <ChevronDown size={14}/>}</div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Modals */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-end justify-center bg-black/40 backdrop-blur-sm p-4">
                            <div className="bg-white w-full max-w-md p-6 rounded-t-3xl shadow-xl animate-in slide-in-from-bottom duration-300">
                                <div className="flex justify-between items-center mb-6"><h3 className="font-bold text-lg">{editingEventId ? '일정 수정' : '새 일정 추가'}</h3><button onClick={() => setIsModalOpen(false)} className="p-1 bg-stone-100 rounded-full"><X size={18}/></button></div>
                                <div className="space-y-4">
                                    <div className="grid grid-cols-5 gap-2">{Object.entries(categoryStyle).map(([k, v]) => (
                                        <button key={k} onClick={() => setNewEntry({...newEntry, type: k})} className={`py-2 rounded-xl text-[10px] font-bold border transition-all ${newEntry.type === k ? 'bg-stone-800 text-white border-stone-800' : 'bg-white text-stone-400 border-stone-100'}`}>{v.label}</button>
                                    ))}</div>
                                    <input className="w-full bg-stone-50 p-3 rounded-xl outline-none text-sm" placeholder="장소명" value={newEntry.title} onChange={e => setNewEntry({...newEntry, title: e.target.value})}/>
                                    <div className="flex gap-3">
                                        <input type="time" className="flex-1 bg-stone-50 p-3 rounded-xl outline-none text-sm" value={newEntry.time} onChange={e => setNewEntry({...newEntry, time: e.target.value})}/>
                                        <input type="number" className="flex-1 bg-stone-50 p-3 rounded-xl outline-none text-sm" placeholder="비용(€)" value={newEntry.cost} onChange={e => setNewEntry({...newEntry, cost: e.target.value})}/>
                                    </div>
                                    <button onClick={handleSaveEntry} className="w-full bg-lime-400 text-lime-900 py-4 rounded-xl font-bold shadow-lg">저장하기</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {isConverterOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm p-6" onClick={() => setIsConverterOpen(false)}>
                            <div className="bg-white w-full max-w-xs p-6 rounded-3xl shadow-xl" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-6"><h3 className="font-bold flex items-center gap-2"><Calculator className="text-purple-500"/> 환율 계산기</h3><button onClick={() => setIsConverterOpen(false)}><X size={18}/></button></div>
                                <div className="space-y-4">
                                    <div className="bg-stone-50 p-3 rounded-xl text-[10px] font-bold text-stone-400 text-center uppercase tracking-widest">1 € = {exchangeRate} KRW</div>
                                    <div className="relative"><label className="text-[10px] font-bold text-stone-400 absolute top-2 left-3">EUR (€)</label><input type="number" className="w-full bg-stone-50 p-3 pt-6 rounded-xl text-lg font-bold outline-none border border-transparent focus:border-purple-300 transition-all" value={convertValues.eur} onChange={e => setConvertValues({eur: e.target.value, krw: e.target.value ? Math.round(e.target.value * exchangeRate) : ''})}/></div>
                                    <div className="relative"><label className="text-[10px] font-bold text-stone-400 absolute top-2 left-3">KRW (원)</label><input type="number" className="w-full bg-stone-50 p-3 pt-6 rounded-xl text-lg font-bold outline-none border border-transparent focus:border-purple-300 transition-all" value={convertValues.krw} onChange={e => setConvertValues({eur: e.target.value ? (e.target.value / exchangeRate).toFixed(2) : '', krw: e.target.value})}/></div>
                                </div>
                                <button onClick={() => setConvertValues({eur: '', krw: ''})} className="w-full mt-6 py-2 bg-stone-100 text-stone-400 font-bold text-xs rounded-lg">초기화</button>
                            </div>
                        </div>
                    )}

                    {isBudgetModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm p-6" onClick={() => setIsBudgetModalOpen(false)}>
                            <div className="bg-white w-full max-w-xs p-6 rounded-3xl shadow-xl" onClick={e => e.stopPropagation()}>
                                <h3 className="font-bold mb-4 flex items-center gap-2 font-cooper"><Wallet className="text-emerald-500"/> Set Budget</h3>
                                <input type="number" className="w-full bg-stone-50 p-4 rounded-xl text-lg font-bold outline-none mb-4" placeholder="총 예산(€)" value={totalBudget || ''} onChange={e => setTotalBudget(Number(e.target.value))}/>
                                <button onClick={() => setIsBudgetModalOpen(false)} className="w-full py-4 bg-emerald-500 text-white font-bold rounded-xl shadow-lg">예산 저장</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TripPlanner />);
    </script>
</body>
</html>
