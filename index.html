<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Trip Planner ✈️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Chonburi&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #FDFCF8; }
        .font-cooper { font-family: 'Cooper Black', 'Chonburi', serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Icons ---
        const IconBase = ({ children, size = 18, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );
        const Plus = (props) => <IconBase {...props}><path d="M5 12h14"/><path d="M12 5v14"/></IconBase>;
        const X = (props) => <IconBase {...props}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></IconBase>;
        const Trash2 = (props) => <IconBase {...props}><path d="M3 6h18"/><path d="M19 6v14c0 1.1-.9 2-2 2H7c-1.1 0-2-.9-2-2V6"/><path d="M8 6V4c0-1.1.9-2 2-2h4c1.1 0 2 .9 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></IconBase>;
        const Calculator = (props) => <IconBase {...props}><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></IconBase>;
        const Edit2 = (props) => <IconBase {...props}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></IconBase>;
        const MapPin = (props) => <IconBase {...props}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></IconPin>;
        const Utensils = (props) => <IconBase {...props}><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></IconBase>;
        const ShoppingBag = (props) => <IconBase {...props}><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></IconBase>;
        const Car = (props) => <IconBase {...props}><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><path d="M9 17h6"/><circle cx="17" cy="17" r="2"/></IconBase>;
        const Home = (props) => <IconBase {...props}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></IconBase>;

        const TripPlanner = () => {
            const [activeTab, setActiveTab] = useState('itinerary');
            const [destination, setDestination] = useState(() => localStorage.getItem('tripDest') || 'Europe Trip ✈️');
            const [days, setDays] = useState(() => {
                const saved = localStorage.getItem('tripDaysV2');
                return saved ? JSON.parse(saved) : [{ id: Date.now(), date: "1일차", title: "여행 시작", events: [] }];
            });
            const [selectedDayId, setSelectedDayId] = useState(days[0]?.id);
            const [exchangeRate, setExchangeRate] = useState(1719); // 2026.03.08 구글 환율 기준 fallback
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [newEntry, setNewEntry] = useState({ type: 'visit', title: '', time: '', cost: '', note: '' });

            // 환율 가져오기 (ECB 기반)
            useEffect(() => {
                fetch('https://api.frankfurter.dev/v1/latest?base=EUR&symbols=KRW')
                    .then(res => res.json())
                    .then(data => { if(data.rates.KRW) setExchangeRate(data.rates.KRW); })
                    .catch(err => console.error("환율 로드 실패:", err));
            }, []);

            useEffect(() => {
                localStorage.setItem('tripDaysV2', JSON.stringify(days));
                localStorage.setItem('tripDest', destination);
            }, [days, destination]);

            const addDay = () => {
                const newDay = { id: Date.now(), date: `${days.length + 1}일차`, title: "새로운 일정", events: [] };
                setDays([...days, newDay]);
                setSelectedDayId(newDay.id);
            };

            const removeDay = (id, e) => {
                e.stopPropagation();
                if (days.length === 1) return alert("최소 한 개의 일정은 있어야 합니다.");
                if (confirm("이 날의 모든 일정이 삭제됩니다. 계속할까요?")) {
                    const filtered = days.filter(d => d.id !== id);
                    setDays(filtered);
                    if (selectedDayId === id) setSelectedDayId(filtered[0].id);
                }
            };

            const handleSaveEvent = () => {
                if (!newEntry.title) return;
                setDays(prev => prev.map(d => d.id === selectedDayId ? {
                    ...d, events: [...d.events, { ...newEntry, id: Date.now(), cost: Number(newEntry.cost) || 0 }].sort((a,b) => a.time.localeCompare(b.time))
                } : d));
                setIsModalOpen(false);
                setNewEntry({ type: 'visit', title: '', time: '', cost: '', note: '' });
            };

            const currentDay = days.find(d => d.id === selectedDayId) || days[0];
            const totalSpent = days.reduce((acc, d) => acc + d.events.reduce((s, e) => s + (e.cost || 0), 0), 0);

            return (
                <div className="max-w-md mx-auto h-screen bg-[#FDFCF8] flex flex-col shadow-2xl">
                    <header className="p-5 bg-white border-b border-stone-100 sticky top-0 z-20">
                        <div className="flex justify-between items-center mb-4">
                            <input className="font-cooper text-xl bg-transparent outline-none w-2/3" value={destination} onChange={e => setDestination(e.target.value)} />
                            <div className="text-right">
                                <p className="text-[10px] font-bold text-stone-400">TOTAL</p>
                                <p className="text-lg font-bold">{totalSpent.toLocaleString()} €</p>
                                <p className="text-[10px] text-stone-400">≈ {(totalSpent * exchangeRate).toLocaleString()}원</p>
                            </div>
                        </div>
                        <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                            {days.map((day, idx) => (
                                <div key={day.id} onClick={() => setSelectedDayId(day.id)} className={`relative flex-shrink-0 px-4 py-2 rounded-xl border transition-all cursor-pointer ${selectedDayId === day.id ? 'bg-lime-100 border-lime-300' : 'bg-white border-stone-100'}`}>
                                    <span className="text-xs font-bold">{idx + 1}일</span>
                                    {days.length > 1 && <button onClick={(e) => removeDay(day.id, e)} className="absolute -top-1 -right-1 bg-red-400 text-white rounded-full p-0.5"><X size={8}/></button>}
                                </div>
                            ))}
                            <button onClick={addDay} className="flex-shrink-0 px-4 py-2 rounded-xl border-2 border-dashed border-stone-200 text-stone-400 hover:bg-stone-50"><Plus size={16}/></button>
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto p-4 pb-20">
                        <div className="bg-stone-800 text-white p-4 rounded-2xl mb-6 shadow-lg flex justify-between items-center">
                             <input className="bg-transparent font-bold text-lg outline-none w-full" value={currentDay.title} onChange={e => {
                                 const val = e.target.value;
                                 setDays(prev => prev.map(d => d.id === selectedDayId ? {...d, title: val} : d));
                             }} />
                             <span className="text-lime-400 font-black text-xl">D-{days.findIndex(d => d.id === selectedDayId) + 1}</span>
                        </div>

                        <div className="space-y-4">
                            {currentDay.events.map(event => (
                                <div key={event.id} className="bg-white p-4 rounded-2xl border border-stone-100 shadow-sm flex gap-4">
                                    <div className="w-10 h-10 rounded-full bg-orange-50 flex items-center justify-center text-orange-500">
                                        {event.type === 'food' ? <Utensils size={18}/> : <MapPin size={18}/>}
                                    </div>
                                    <div className="flex-1">
                                        <div className="flex justify-between">
                                            <span className="text-[10px] font-bold text-stone-400">{event.time}</span>
                                            <span className="text-xs font-bold text-stone-600">{event.cost.toLocaleString()} €</span>
                                        </div>
                                        <h4 className="font-bold text-sm">{event.title}</h4>
                                        {event.note && <p className="text-xs text-stone-400 mt-1">{event.note}</p>}
                                    </div>
                                </div>
                            ))}
                            <button onClick={() => setIsModalOpen(true)} className="w-full py-4 rounded-2xl border-2 border-dashed border-stone-200 text-stone-400 font-bold text-sm">+ 일정 추가</button>
                        </div>
                    </main>

                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black/50 flex items-end z-50">
                            <div className="bg-white w-full rounded-t-3xl p-6 animate-in slide-in-from-bottom">
                                <div className="flex justify-between items-center mb-4"><h3 className="font-bold">일정 추가</h3><button onClick={() => setIsModalOpen(false)}><X/></button></div>
                                <div className="space-y-3">
                                    <input className="w-full p-3 bg-stone-50 rounded-xl outline-none" placeholder="장소명" value={newEntry.title} onChange={e => setNewEntry({...newEntry, title: e.target.value})} />
                                    <div className="flex gap-2">
                                        <input type="time" className="flex-1 p-3 bg-stone-50 rounded-xl outline-none" value={newEntry.time} onChange={e => setNewEntry({...newEntry, time: e.target.value})} />
                                        <input type="number" className="flex-1 p-3 bg-stone-50 rounded-xl outline-none" placeholder="비용(€)" value={newEntry.cost} onChange={e => setNewEntry({...newEntry, cost: e.target.value})} />
                                    </div>
                                    <textarea className="w-full p-3 bg-stone-50 rounded-xl outline-none h-20" placeholder="메모" value={newEntry.note} onChange={e => setNewEntry({...newEntry, note: e.target.value})} />
                                    <button onClick={handleSaveEvent} className="w-full py-4 bg-lime-400 text-lime-900 font-bold rounded-xl shadow-lg">저장</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TripPlanner />);
    </script>
</body>
</html>
